services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: solar_tsdb
    environment:
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar
      POSTGRES_DB: solar_db
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: solar_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
    depends_on:
      timescaledb:
        condition: service_healthy

  dashboard:
    build: .
    container_name: solar_dashboard
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api


volumes:
  tsdb_data:
