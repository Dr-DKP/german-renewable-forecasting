services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: solar_tsdb
    environment:
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar
      POSTGRES_DB: solar_db
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tsdb_data:
